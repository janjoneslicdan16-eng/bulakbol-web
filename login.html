<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="Style.css">
</head>

<body>

<div class="back-btn" onclick="window.location.href='index.html'">
  &#8592;
</div>

<section class="login-section d-flex align-items-center justify-content-center">

  <div class="container">
    <div class="row justify-content-center">

      <div class="col-md-5 form-box">
        <h4 class="text-center mb-3">Welcome Back</h4>
        <p class="text-center small">Login to continue your journey</p>

        <input type="email" class="form-control mb-3" placeholder="Email">
        <input type="password" class="form-control mb-2" placeholder="Password">

        <div class="text-end mb-3">
          <a href="#" class="small">Forgot Password?</a>
        </div>

        <button class="btn btn-primary w-100 mb-3">Login</button>

        <p class="text-center">OR</p>

        <button class="btn btn-light border w-100">
          Continue with Google
        </button>
      </div>

      <div class="col-md-5 form-box ms-md-3 mt-4 mt-md-0">
        <h4 class="text-center mb-3">Create Account</h4>
        <p class="text-center small">Start booking your dream vacation</p>

        <input type="text" class="form-control mb-3" placeholder="Full Name">
        <input type="email" class="form-control mb-3" placeholder="Email">
        <input type="password" class="form-control mb-3" placeholder="Password">
        <input type="password" class="form-control mb-3" placeholder="Confirm Password">

        <button class="btn btn-primary w-100 mb-2">Sign Up</button>

        <p class="text-center small">
          Already have an account? <a href="#">Login</a>
        </p>
      </div>

    </div>

    <div class="text-center text-white mt-4 small">
      © 2025 Bulakbol Resort Bookings. All rights reserved.
      <br>
      Privacy Policy · Terms of Service · Contact Us
    </div>

  </div>

</section>

</body>
</html>
